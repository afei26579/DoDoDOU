<svg width="380" height="380" viewBox="20 20 340 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>画册图标 - 激活状态</title>
  <desc>温馨手工坊画册页导航图标激活态，紫色发光翻开相册</desc>

  <defs>
    <!-- 紫色发光滤镜 -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.7 0 0.5 0 0.2
                0   0 0.7 0 0.1
                0.9 0 1.2 0 0.3
                0   0 0   1 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 外围光晕：铺满画布，从中心衰减 -->
    <radialGradient id="book-aura" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#D8B4E2" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#D8B4E2" stop-opacity="0.28"/>
      <stop offset="80%"  stop-color="#C090D8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D8B4E2" stop-opacity="0"/>
    </radialGradient>

    <!-- 页面描边渐变 -->
    <linearGradient id="page-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EED8F8"/>
      <stop offset="50%" stop-color="#D8B4E2"/>
      <stop offset="100%" stop-color="#A860C8"/>
    </linearGradient>

    <!-- 书脊渐变 -->
    <linearGradient id="spine-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C890E0"/>
      <stop offset="100%" stop-color="#8840B8"/>
    </linearGradient>
  </defs>

  <!-- 背景光晕 -->
  <rect x="0" y="0" width="380" height="380" fill="url(#book-aura)"/>

  <!-- ===== 书本底阴影发光 ===== -->
  <rect x="48" y="104" width="292" height="200" rx="18" ry="18"
        fill="#C090D8" opacity="0.25" filter="url(#glow-purple)"/>

  <!-- ===== 右页 ===== -->
  <rect x="192" y="94" width="148" height="196" rx="18" ry="18"
        fill="#F0E8F8" stroke="url(#page-stroke)" stroke-width="10"
        filter="url(#glow-purple)"/>
  <!-- 右页内底 -->
  <rect x="202" y="104" width="128" height="176" rx="12" ry="12"
        fill="#FBF7FF"/>
  <!-- 右页高光 -->
  <rect x="210" y="110" width="52" height="26" rx="10"
        fill="#FFFFFF" opacity="0.5"/>
  <!-- 右页衬线 -->
  <line x1="212" y1="144" x2="320" y2="144" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="212" y1="164" x2="320" y2="164" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="212" y1="244" x2="320" y2="244" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="212" y1="264" x2="320" y2="264" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- 右页拼豆贴纸 -->
  <rect x="214" y="176" width="116" height="58" rx="10" ry="10"
        fill="#F4EEFF" stroke="#D8B4E2" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="244" cy="205" r="13" fill="#7ED9B0" stroke="#4DBF8A" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="239" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="272" cy="205" r="13" fill="#F9D77E" stroke="#E0B040" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="267" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="300" cy="205" r="13" fill="#C89EDA" stroke="#A870C0" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="295" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <!-- 贴纸折角 -->
  <path d="M318 176 L330 176 L330 188 Z" fill="#D8B4E2" opacity="0.6"/>

  <!-- ===== 左页 ===== -->
  <rect x="44" y="94" width="148" height="196" rx="18" ry="18"
        fill="#F0E8F8" stroke="url(#page-stroke)" stroke-width="10"
        filter="url(#glow-purple)"/>
  <!-- 左页内底 -->
  <rect x="54" y="104" width="128" height="176" rx="12" ry="12"
        fill="#FBF7FF"/>
  <!-- 左页高光 -->
  <rect x="62" y="110" width="52" height="26" rx="10"
        fill="#FFFFFF" opacity="0.5"/>
  <!-- 左页衬线 -->
  <line x1="58" y1="144" x2="166" y2="144" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="58" y1="164" x2="166" y2="164" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="58" y1="244" x2="166" y2="244" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="58" y1="264" x2="166" y2="264" stroke="#D8B4E2" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- 左页拼豆贴纸 -->
  <rect x="56" y="176" width="116" height="58" rx="10" ry="10"
        fill="#F4EEFF" stroke="#D8B4E2" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="90" cy="205" r="13" fill="#F0907A" stroke="#D06050" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="85" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="118" cy="205" r="13" fill="#A0C8F0" stroke="#6090D0" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="113" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="146" cy="205" r="13" fill="#FFDAC1" stroke="#E0A080" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="141" cy="200" r="4" fill="#FFFFFF" opacity="0.45"/>
  <!-- 贴纸折角 -->
  <path d="M160 176 L172 176 L172 188 Z" fill="#D8B4E2" opacity="0.6"/>

  <!-- ===== 书脊 ===== -->
  <rect x="182" y="90" width="18" height="204" rx="9" ry="9"
        fill="url(#spine-grad)" filter="url(#glow-purple)"/>
  <!-- 书脊高光 -->
  <rect x="185" y="98" width="6" height="188" rx="3"
        fill="#EED8F8" opacity="0.55"/>

  <!-- ===== 书签丝带 ===== -->
  <path d="M258 90 L258 118 L268 130 L278 118 L278 90"
        fill="#C89EDA" stroke="#A870C0" stroke-width="2"
        filter="url(#glow-purple)"/>
  <line x1="262" y1="94" x2="262" y2="120" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- ===== 散落豆豆 ===== -->
  <circle cx="50" cy="310" r="11" fill="#7ED9B0" stroke="#4DBF8A" stroke-width="2.5" filter="url(#glow-purple)"/>
  <circle cx="46" cy="306" r="3.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="330" cy="304" r="9" fill="#F0907A" stroke="#D06050" stroke-width="2" filter="url(#glow-purple)"/>
  <circle cx="326" cy="300" r="3" fill="#FFFFFF" opacity="0.45"/>

  <!-- ===== 装饰星星发光 ===== -->
  <path d="M336 68 L340 79 L351 82 L340 85 L336 96 L332 85 L321 82 L332 79 Z"
        fill="#D8B4E2" opacity="1" filter="url(#glow-purple)"/>
  <path d="M34 198 L37 207 L46 210 L37 213 L34 222 L31 213 L22 210 L31 207 Z"
        fill="#C890E0" opacity="1" filter="url(#glow-purple)"/>

  <!-- 小圆点 -->
  <circle cx="40" cy="108" r="5" fill="#D8B4E2" opacity="1" filter="url(#glow-purple)"/>
  <circle cx="346" cy="172" r="6" fill="#D8B4E2" opacity="1" filter="url(#glow-purple)"/>
  <circle cx="352" cy="298" r="7" fill="#D8B4E2" opacity="0.9" filter="url(#glow-purple)"/>
</svg>
