<svg width="100%" viewBox="20 20 340 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>画册图标 - 未激活状态</title>
  <desc>温馨手工坊画册页导航图标，翻开的相册内含拼豆作品</desc>

  <!-- ===== 书本底阴影 ===== -->
  <rect x="48" y="100" width="292" height="200" rx="18" ry="18"
        fill="#C8B09A" opacity="0.30"/>

  <!-- ===== 右页（右半册）===== -->
  <rect x="192" y="92" width="148" height="196" rx="18" ry="18"
        fill="#EDE0D0" stroke="#8B6F55" stroke-width="10"/>
  <!-- 右页高光 -->
  <rect x="202" y="102" width="55" height="28" rx="10"
        fill="#FFFFFF" opacity="0.28"/>
  <!-- 右页内衬线（横线纹路）-->
  <line x1="210" y1="142" x2="328" y2="142" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="210" y1="162" x2="328" y2="162" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="210" y1="242" x2="328" y2="242" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="210" y1="262" x2="328" y2="262" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- 右页拼豆作品贴纸（小方块） -->
  <rect x="214" y="174" width="116" height="58" rx="10" ry="10"
        fill="#FAF6F0" stroke="#C8B09A" stroke-width="2.5"/>
  <!-- 贴纸内豆豆 3颗 -->
  <circle cx="244" cy="203" r="13" fill="#7ED9B0" stroke="#4DBF8A" stroke-width="2.5"/>
  <circle cx="239" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="272" cy="203" r="13" fill="#F9D77E" stroke="#E0B040" stroke-width="2.5"/>
  <circle cx="267" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="300" cy="203" r="13" fill="#C89EDA" stroke="#A870C0" stroke-width="2.5"/>
  <circle cx="295" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <!-- 贴纸角标（小三角折角）-->
  <path d="M318 174 L330 174 L330 186 Z" fill="#C8B09A" opacity="0.5"/>

  <!-- ===== 左页（左半册）===== -->
  <rect x="44" y="92" width="148" height="196" rx="18" ry="18"
        fill="#F5EEE6" stroke="#8B6F55" stroke-width="10"/>
  <!-- 左页高光 -->
  <rect x="54" y="102" width="55" height="28" rx="10"
        fill="#FFFFFF" opacity="0.28"/>
  <!-- 左页内衬线 -->
  <line x1="56" y1="142" x2="174" y2="142" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="56" y1="162" x2="174" y2="162" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="56" y1="242" x2="174" y2="242" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="56" y1="262" x2="174" y2="262" stroke="#C8B09A" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- 左页拼豆作品贴纸 -->
  <rect x="56" y="174" width="116" height="58" rx="10" ry="10"
        fill="#FAF6F0" stroke="#C8B09A" stroke-width="2.5"/>
  <!-- 心形拼豆图案 3颗 -->
  <circle cx="90" cy="203" r="13" fill="#F0907A" stroke="#D06050" stroke-width="2.5"/>
  <circle cx="85" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="118" cy="203" r="13" fill="#A0C8F0" stroke="#6090D0" stroke-width="2.5"/>
  <circle cx="113" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <circle cx="146" cy="203" r="13" fill="#FFDAC1" stroke="#E0A080" stroke-width="2.5"/>
  <circle cx="141" cy="198" r="4" fill="#FFFFFF" opacity="0.38"/>
  <!-- 贴纸角标 -->
  <path d="M160 174 L172 174 L172 186 Z" fill="#C8B09A" opacity="0.5"/>

  <!-- ===== 书脊（中缝）===== -->
  <rect x="182" y="88" width="18" height="204" rx="9" ry="9"
        fill="#8B6F55"/>
  <!-- 书脊高光 -->
  <rect x="185" y="96" width="6" height="188" rx="3"
        fill="#C8A880" opacity="0.45"/>

  <!-- ===== 书签丝带 ===== -->
  <path d="M258 88 L258 116 L268 128 L278 116 L278 88"
        fill="#C89EDA" stroke="#A870C0" stroke-width="2"/>
  <!-- 丝带高光 -->
  <line x1="262" y1="92" x2="262" y2="118" stroke="#FFFFFF" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>

  <!-- ===== 散落豆豆 ===== -->
  <circle cx="50" cy="310" r="11" fill="#7ED9B0" stroke="#4DBF8A" stroke-width="2.5"/>
  <circle cx="46" cy="306" r="3.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="330" cy="304" r="9" fill="#F0907A" stroke="#D06050" stroke-width="2"/>
  <circle cx="326" cy="300" r="3" fill="#FFFFFF" opacity="0.38"/>

  <!-- ===== 装饰元素 ===== -->
  <!-- 右上星星 -->
  <path d="M336 68 L339 77 L348 80 L339 83 L336 92 L333 83 L324 80 L333 77 Z"
        fill="#FFDAC1" opacity="0.9"/>
  <!-- 左侧星星 -->
  <path d="M34 198 L37 206 L45 209 L37 212 L34 220 L31 212 L23 209 L31 206 Z"
        fill="#D8B4E2" opacity="0.8"/>
  <!-- 小圆点 -->
  <circle cx="40" cy="108" r="5" fill="#FFDAC1" opacity="0.8"/>
  <circle cx="346" cy="172" r="5" fill="#B5EAD7" opacity="0.9"/>
  <circle cx="352" cy="298" r="6" fill="#D8B4E2" opacity="0.6"/>
</svg>
