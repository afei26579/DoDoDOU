<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="嘟豆豆正式服暂未开放，内测进行中。" />
    <title>嘟豆豆正式服未开放</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=ZCOOL+KuaiLe&display=swap');

      :root {
        color-scheme: light;
        --font-title: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-body: 'Nunito', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
        --ink: #5d534a;
        --muted: rgba(93, 83, 74, 0.68);
        --accent: #c786dc;
        --mint: #4aae82;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        font-family: var(--font-body);
        color: var(--ink);
        background: #fbf3eb;
        overflow-x: hidden;
      }

      button,
      input {
        font: inherit;
      }

      .official-login {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        grid-template-columns: 1fr;
        align-items: end;
        justify-items: center;
        padding: calc(var(--safe-top) + clamp(28px, 8vh, 76px)) clamp(22px, 7vw, 44px) calc(var(--safe-bottom) + clamp(28px, 7vh, 56px));
        background:
          linear-gradient(180deg, rgba(255, 251, 246, 0.12), rgba(255, 251, 246, 0.32)),
          url('/assets/backgrounds/login_mobile_bg.png') center / cover no-repeat;
      }

      .official-showcase {
        display: none;
      }

      .official-panel {
        width: min(85vw, 390px);
        border: 1.5px solid rgba(255, 255, 255, 0.82);
        border-radius: 28px;
        padding: clamp(26px, 7vw, 34px) clamp(22px, 6vw, 30px) clamp(24px, 6vw, 32px);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 46px rgba(103, 79, 61, 0.13);
        backdrop-filter: blur(14px);
      }

      .official-brand {
        display: grid;
        justify-items: center;
        text-align: center;
        margin-bottom: 20px;
      }

      .official-brand img {
        width: min(92%, 270px);
        height: auto;
        display: block;
        margin: -48px 0 -46px;
      }

      .official-brand h1 {
        margin: 10px 0 0;
        color: #59443a;
        font-family: var(--font-title);
        font-size: clamp(28px, 7.2vw, 36px);
        line-height: 1.08;
        font-weight: 900;
        letter-spacing: 0;
      }

      .official-message {
        display: grid;
        gap: 7px;
        margin: 0 0 18px;
        text-align: center;
      }

      .official-message strong {
        color: #9e63bb;
        font-size: clamp(18px, 4.8vw, 24px);
        line-height: 1.2;
        font-weight: 900;
      }

      .official-message span {
        color: var(--muted);
        font-size: clamp(14px, 3.8vw, 17px);
        line-height: 1.45;
        font-weight: 800;
      }

      .official-form {
        display: grid;
        gap: 11px;
      }

      .official-field {
        position: relative;
      }

      .official-field svg {
        position: absolute;
        left: 18px;
        top: 50%;
        width: 24px;
        height: 24px;
        transform: translateY(-50%);
        fill: none;
        stroke: #bd7bd0;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
        pointer-events: none;
      }

      .official-field input {
        width: 100%;
        min-height: 52px;
        border: 1.5px solid rgba(221, 202, 190, 0.92);
        border-radius: 17px;
        padding: 0 18px 0 56px;
        color: rgba(95, 80, 73, 0.44);
        background: rgba(255, 255, 255, 0.56);
        outline: none;
        font-size: 16px;
        font-weight: 800;
        cursor: not-allowed;
      }

      .official-disabled-button {
        min-height: 54px;
        border: 1.5px solid rgba(196, 138, 215, 0.62);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(219, 168, 233, 0.52), rgba(199, 134, 220, 0.46));
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(18px, 5vw, 24px);
        line-height: 1;
        font-weight: 900;
        cursor: not-allowed;
        text-shadow: 0 1px 0 rgba(105, 61, 119, 0.14);
      }

      .official-link {
        min-height: 48px;
        border: 1.5px solid rgba(117, 202, 168, 0.66);
        border-radius: 17px;
        display: inline-grid;
        place-items: center;
        text-decoration: none;
        background: linear-gradient(180deg, rgba(238, 255, 248, 0.92), rgba(226, 255, 244, 0.82));
        color: var(--mint);
        font-size: clamp(16px, 4.5vw, 20px);
        font-weight: 900;
      }

      .official-note {
        margin: 2px 0 0;
        color: rgba(126, 99, 88, 0.62);
        font-size: 13px;
        line-height: 1.45;
        text-align: center;
        font-weight: 700;
      }

      @media (min-width: 900px) {
        .official-login {
          grid-template-columns: minmax(400px, 580px) minmax(440px, 590px);
          justify-content: center;
          align-items: center;
          gap: clamp(36px, 5vw, 72px);
          padding: clamp(42px, 6vh, 74px) clamp(52px, 7vw, 118px);
          background:
            linear-gradient(90deg, rgba(255, 248, 240, 0.02), rgba(255, 248, 240, 0.06)),
            url('/assets/backgrounds/login_desktop_bg.png') center / cover no-repeat;
          overflow: hidden;
        }

        .official-showcase {
          display: grid;
          justify-items: center;
          align-self: center;
          width: min(45vw, 600px);
          min-width: 390px;
          text-align: center;
          transform: translateY(-128px);
        }

        .official-showcase img {
          width: min(82%, 480px);
          height: auto;
          display: block;
          margin: 0 0 -72px;
        }

        .official-showcase h2 {
          margin: 0;
          color: #9e63bb;
          font-family: var(--font-title);
          font-size: clamp(38px, 3.4vw, 52px);
          line-height: 1.1;
          font-weight: 900;
          letter-spacing: 0;
        }

        .official-showcase p {
          margin: 12px 0 0;
          color: rgba(101, 77, 66, 0.76);
          font-size: clamp(17px, 1.45vw, 21px);
          line-height: 1.35;
          font-weight: 800;
        }

        .official-panel {
          width: min(40.5vw, 560px);
          min-width: 440px;
          max-width: 560px;
          border-radius: 30px;
          padding: clamp(54px, 7.3vh, 72px) clamp(48px, 4.5vw, 64px) clamp(42px, 5.2vh, 52px);
        }

        .official-brand img {
          display: none;
        }

        .official-brand h1 {
          margin-top: 0;
          font-size: clamp(32px, 2.7vw, 42px);
        }

        .official-form {
          gap: 14px;
        }

        .official-field svg {
          left: 23px;
          width: 28px;
          height: 28px;
        }

        .official-field input {
          min-height: 60px;
          border-radius: 15px;
          padding-left: 72px;
          font-size: 20px;
        }

        .official-disabled-button {
          min-height: 64px;
          border-radius: 15px;
          font-size: 26px;
        }

        .official-link {
          min-height: 58px;
          border-radius: 15px;
          font-size: 22px;
        }

        .official-note {
          font-size: 16px;
        }
      }

      @media (min-width: 700px) and (max-width: 1199px) and (orientation: landscape) {
        .official-login {
          grid-template-columns: minmax(360px, 1fr) minmax(360px, 430px);
          align-items: center;
          justify-items: center;
          gap: clamp(22px, 4vw, 44px);
          padding: clamp(34px, 5vh, 48px) clamp(42px, 6vw, 64px);
          background:
            linear-gradient(90deg, rgba(255, 249, 244, 0.04), rgba(255, 249, 244, 0.12)),
            url('/assets/backgrounds/login_tablet_horizontal_bg.png') center / cover no-repeat;
          overflow: hidden;
        }

        .official-showcase {
          display: grid;
          justify-items: center;
          width: min(44vw, 430px);
          min-width: 340px;
          text-align: center;
          transform: translateY(-76px);
        }

        .official-showcase img {
          width: min(100%, 420px);
          height: auto;
          display: block;
          margin: -24px 0 -100px;
        }

        .official-showcase h2 {
          display: none;
        }

        .official-showcase p {
          margin: -18px 0 0;
          color: rgba(101, 77, 66, 0.72);
          font-size: clamp(17px, 2vw, 22px);
          line-height: 1.25;
          font-weight: 800;
        }

        .official-panel {
          width: min(40vw, 430px);
          min-width: 380px;
          max-width: 430px;
          border-radius: 34px;
          padding: clamp(34px, 5vh, 46px) clamp(34px, 4.8vw, 44px) clamp(24px, 4vh, 34px);
        }

        .official-brand img {
          display: none;
        }

        .official-brand h1 {
          margin: 0;
          font-size: clamp(26px, 3vw, 34px);
        }

        .official-field input,
        .official-disabled-button,
        .official-link {
          min-height: 48px;
          border-radius: 999px;
          font-size: 17px;
        }
      }

      @media (min-width: 700px) and (max-width: 1199px) and (orientation: portrait) {
        .official-login {
          align-items: start;
          padding: calc(var(--safe-top) + clamp(28px, 4.5vh, 46px)) clamp(36px, 6vw, 56px) calc(var(--safe-bottom) + clamp(24px, 4vh, 40px));
          background:
            linear-gradient(180deg, rgba(255, 249, 244, 0.05), rgba(255, 249, 244, 0.12)),
            url('/assets/backgrounds/login_tablet_vertical_bg.png') center / cover no-repeat;
          overflow: hidden;
        }

        .official-showcase {
          display: grid;
          justify-items: center;
          width: min(72vw, 520px);
          text-align: center;
        }

        .official-showcase img {
          width: min(100%, 500px);
          height: auto;
          display: block;
          margin: -52px 0 -160px;
        }

        .official-showcase h2,
        .official-showcase p {
          display: none;
        }

        .official-panel {
          width: min(55vw, 420px);
          min-width: 380px;
          max-width: 420px;
          border-radius: 24px;
          padding: clamp(24px, 3.5vh, 32px) clamp(28px, 4.4vw, 36px) clamp(18px, 3vh, 26px);
        }

        .official-brand img {
          display: none;
        }

        .official-brand h1 {
          margin: 0;
          font-size: clamp(22px, 4vw, 28px);
        }

        .official-message strong {
          font-size: clamp(16px, 3vw, 20px);
        }

        .official-message span {
          font-size: clamp(12px, 2vw, 15px);
        }

        .official-form {
          gap: 10px;
        }

        .official-field svg {
          left: 14px;
          width: 20px;
          height: 20px;
        }

        .official-field input {
          min-height: 38px;
          border-radius: 8px;
          padding-left: 42px;
          font-size: 12px;
        }

        .official-disabled-button,
        .official-link {
          min-height: 38px;
          border-radius: 999px;
          font-size: 14px;
        }

        .official-note {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="official-login" aria-label="嘟豆豆正式服登录页">
      <section class="official-showcase" aria-label="嘟豆豆欢迎区">
        <img src="/assets/logos/logo_base.png" alt="DoDouDou 嘟豆豆" />
        <h2>正式服未开放</h2>
        <p>内测进行中，欢迎前往内测服体验。</p>
      </section>

      <section class="official-panel" aria-label="正式服状态">
        <header class="official-brand">
          <img src="/assets/logos/logo_base.png" alt="DoDouDou 嘟豆豆" />
          <h1>正式服未开放</h1>
        </header>

        <p class="official-message">
          <strong>正式服未开放。内测进行中。</strong>
          <span>网址是 dodoudou.xyz</span>
        </p>

        <form class="official-form" action="#" onsubmit="return false" aria-disabled="true">
          <label class="official-field">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4.75 6.75h14.5v10.5H4.75z" />
              <path d="m5.25 7.25 6.75 5.5 6.75-5.5" />
            </svg>
            <input type="text" value="账号登录暂不可用" disabled aria-label="账号登录暂不可用" />
          </label>

          <label class="official-field">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6.75 10.25h10.5v8H6.75z" />
              <path d="M8.75 10.25V8a3.25 3.25 0 0 1 6.5 0v2.25" />
              <path d="M12 14.15v1.75" />
            </svg>
            <input type="password" value="000000" disabled aria-label="密码登录暂不可用" />
          </label>

          <button class="official-disabled-button" type="button" disabled>登录暂不可用</button>
          <a class="official-link" href="https://dodoudou.xyz/">前往内测服</a>
          <p class="official-note">正式服开放后，这里会恢复登录入口。</p>
        </form>
      </section>
    </main>
  </body>
</html>
