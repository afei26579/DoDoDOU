<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拼豆豆图纸编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary:    #D8B4E2;
  --primary-d:  #B894CC;
  --primary-l:  #EDD9F5;
  --bg:         #FDFBF7;
  --surface:    #FFFFFF;
  --text:       #5D534A;
  --text-light: #9B8E84;
  --shadow-primary: 0 4px 20px rgba(216,180,226,0.4);
  --shadow-float:   0 8px 40px rgba(93,83,74,0.14);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --font-title: 'ZCOOL KuaiLe', sans-serif;
  --font-body:  'Nunito', sans-serif;
  --titlebar-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--text);
  overflow: hidden;
  height: 100vh; width: 100vw;
  touch-action: none;
  user-select: none;
}

/* ── 标题栏 ── */
#titlebar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--titlebar-h);
  background: linear-gradient(135deg, #F0E6F8 0%, #EAF4F0 50%, #FEF3EC 100%);
  border-bottom: 1.5px solid #E8D5F0;
  box-shadow: 0 2px 16px rgba(216,180,226,0.18);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  z-index: 500;
}
#titlebar-left { display:flex; align-items:center; gap:8px; flex:1; }
#titlebar-logo {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--primary), #C4A8D4);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  box-shadow: 0 3px 10px rgba(216,180,226,0.45);
  flex-shrink:0;
}
#titlebar-text h1 { font-family:var(--font-title); font-size:17px; color:var(--text); line-height:1.1; }
#titlebar-text p  { font-size:9px; color:var(--text-light); font-weight:600; letter-spacing:0.5px; margin-top:1px; }
#titlebar-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.top-btn {
  height:34px; padding:0 11px;
  border:1.5px solid rgba(216,180,226,0.35);
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.75);
  color:var(--text); font-family:var(--font-body); font-size:12px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px;
  transition:all 0.15s; white-space:nowrap;
}
.top-btn:hover { background:var(--primary-l); border-color:var(--primary); box-shadow:var(--shadow-primary); transform:translateY(-1px); }
.top-btn:disabled { opacity:0.35; cursor:default; transform:none; }
.top-btn.icon-only { width:34px; padding:0; }

/* ── 画布区 ── */
#canvas-container {
  position:fixed;
  top:var(--titlebar-h); left:0; right:0; bottom:0;
  overflow:hidden; cursor:crosshair;
  background: repeating-conic-gradient(#e8e4de 0% 25%, #FDFBF7 0% 50%) 0 0 / 18px 18px;
}
#grid-canvas {
  position:absolute;
  image-rendering:pixelated;
  transform-origin:0 0;
  box-shadow:0 6px 40px rgba(93,83,74,0.16);
}

/* ── 预览面板 ── */
#preview-panel {
  position:fixed;
  top: calc(var(--titlebar-h) + 14px);
  right:14px;
  width:150px;
  background:var(--surface);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-float);
  z-index:400;
  border:1.5px solid var(--primary-l);
  overflow:visible;
  transition: opacity 0.18s, transform 0.18s;
}
#preview-panel.collapsed {
  opacity:0;
  pointer-events:none;
  transform: scale(0.85);
}
#preview-canvas-wrap {
  padding:8px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
#preview-canvas {
  image-rendering:pixelated;
  border-radius:var(--radius-sm);
  width:100%; display:block;
  box-shadow:0 2px 10px rgba(93,83,74,0.12);
}
/* 折叠按钮 — 右上角小圆 */
#preview-toggle-btn {
  position:absolute;
  top:-9px; right:-9px;
  width:26px; height:26px;
  border:none; border-radius:50%;
  background: linear-gradient(135deg,#c9a0dc,#a87ec0);
  color:#fff; font-size:13px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(168,126,192,0.5);
  z-index:10;
  transition:background 0.15s, transform 0.15s;
  line-height:1;
}
#preview-toggle-btn:hover { background:linear-gradient(135deg,#b88acc,#9060ac); transform:scale(1.12); }

/* 拖拽层 */
#preview-drag-layer {
  position:absolute; inset:0;
  cursor:move; z-index:5;
  border-radius:var(--radius-md);
}
/* 缩放手柄 */
#preview-resize-handle {
  position:absolute; bottom:-7px; right:-7px;
  width:20px; height:20px;
  background:var(--primary); border-radius:50%;
  cursor:se-resize;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(216,180,226,0.5);
  z-index:10; touch-action:none;
  font-size:9px; color:#fff; font-weight:bold;
}

/* ══════════════════════════════════════════
   最小化后的悬浮球（完全独立，可拖拽）
══════════════════════════════════════════ */
#preview-bubble {
  position: fixed;
  /* 默认：标题栏正下方，右侧 */
  top: calc(var(--titlebar-h) + 10px);
  right: 14px;
  left: auto;
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(145deg, #e8ccf5 0%, #d0a8e8 50%, #b880d4 100%);
  box-shadow: 0 4px 18px rgba(168,126,192,0.45), 0 1px 4px rgba(0,0,0,0.10);
  border: 2px solid rgba(255,255,255,0.6);
  z-index: 450;
  display: none;           /* 默认隐藏，折叠后显示 */
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  touch-action: none;
  transition: box-shadow 0.15s, transform 0.15s;
  overflow: hidden;
}
#preview-bubble:hover {
  box-shadow: 0 6px 24px rgba(168,126,192,0.6), 0 2px 6px rgba(0,0,0,0.12);
  transform: scale(1.05);
}
#preview-bubble.show { display:flex; }

/* 悬浮球内：缩略预览图 */
#bubble-thumb {
  width: 32px; height: 32px;
  border-radius: 8px;
  image-rendering: pixelated;
  background: rgba(255,255,255,0.3);
  border: 1.5px solid rgba(255,255,255,0.5);
  flex-shrink: 0;
}
/* 悬浮球内：文字 */
#bubble-label {
  font-size: 8px;
  font-weight: 800;
  color: rgba(255,255,255,0.92);
  letter-spacing: 0.3px;
  line-height: 1;
}

/* ── 工具栏 ── */
#toolbar {
  position:fixed;
  bottom:18px; left:50%;
  transform:translateX(-50%);
  z-index:600;
  display:flex; flex-direction:column; align-items:stretch;
  touch-action:none;
  max-width:calc(100vw - 24px);
  filter:drop-shadow(0 6px 28px rgba(93,83,74,0.16));
}
#toolbar-drag-zone {
  background:var(--surface);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:5px 16px 0;
  display:flex; justify-content:center;
  cursor:move;
  border:1.5px solid var(--primary-l); border-bottom:none;
}
#toolbar-drag-bar { width:32px; height:3px; background:var(--primary-l); border-radius:99px; margin:3px auto; }
#toolbar-row1 {
  background:var(--surface);
  padding:7px 12px;
  display:flex; align-items:center; gap:5px;
  border:1.5px solid var(--primary-l); border-top:none;
  border-bottom:1px solid rgba(216,180,226,0.2);
  overflow-x:auto; scrollbar-width:none;
}
#toolbar-row1::-webkit-scrollbar { display:none; }
#toolbar-row2 {
  background:linear-gradient(135deg,#faf7fd,#f8f5ff);
  padding:9px 14px;
  display:flex; align-items:center; gap:9px;
  border:1.5px solid var(--primary-l); border-top:none;
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
  min-height:58px; overflow-x:auto; scrollbar-width:none; flex-wrap:nowrap;
}
#toolbar-row2::-webkit-scrollbar { display:none; }

.tool-btn {
  width:40px; height:40px;
  border:2px solid transparent; border-radius:var(--radius-md);
  background:rgba(216,180,226,0.08); color:var(--text); font-size:19px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.16s; flex-shrink:0; position:relative;
}
.tool-btn:hover { background:var(--primary-l); border-color:var(--primary); }
.tool-btn.active {
  background:var(--primary); border-color:var(--primary-d);
  box-shadow:var(--shadow-primary); transform:scale(1.06);
}
.tool-btn.active::after {
  content:''; position:absolute; bottom:-5px; left:50%;
  transform:translateX(-50%); width:4px; height:4px;
  background:var(--primary-d); border-radius:50%;
}
.tool-sep { width:1.5px; height:26px; background:linear-gradient(to bottom,transparent,var(--primary-l),transparent); flex-shrink:0; margin:0 1px; }

#color-swatch {
  width:36px; height:36px; border-radius:var(--radius-md);
  border:2.5px solid var(--primary); cursor:pointer; flex-shrink:0;
  position:relative; overflow:hidden;
  box-shadow:0 2px 8px rgba(216,180,226,0.4); transition:transform 0.15s;
}
#color-swatch:hover { transform:scale(1.1); }
#color-swatch input[type=color] {
  position:absolute; inset:-10px;
  width:calc(100% + 20px); height:calc(100% + 20px);
  opacity:0; cursor:pointer;
}
.recent-dot {
  width:26px; height:26px; border-radius:var(--radius-sm);
  border:2px solid rgba(93,83,74,0.10); cursor:pointer; flex-shrink:0;
  transition:transform 0.12s, box-shadow 0.12s;
}
.recent-dot:hover { transform:scale(1.18); box-shadow:0 2px 8px rgba(0,0,0,0.14); }

.param-label { font-size:9px; font-weight:800; color:var(--text-light); letter-spacing:0.7px; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.param-group { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.size-dots   { display:flex; gap:5px; align-items:center; }
.size-dot-btn {
  border:2px solid var(--primary-l); border-radius:50%; cursor:pointer;
  background:var(--surface); display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.15s;
}
.size-dot-btn:hover { border-color:var(--primary); }
.size-dot-btn.active { background:var(--primary); border-color:var(--primary-d); box-shadow:0 2px 8px rgba(216,180,226,0.5); }
.mini-palette { display:flex; gap:4px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; max-width:180px; }
.mini-palette::-webkit-scrollbar { display:none; }
.mini-color {
  width:24px; height:24px; border-radius:7px;
  border:2px solid transparent; cursor:pointer; flex-shrink:0;
  transition:transform 0.12s, border-color 0.12s;
}
.mini-color:hover { transform:scale(1.18); }
.mini-color.selected { border-color:var(--primary-d); transform:scale(1.1); box-shadow:0 2px 6px rgba(0,0,0,0.18); }
.open-palette-btn {
  width:32px; height:32px;
  border:2px dashed var(--primary); border-radius:var(--radius-sm);
  background:var(--primary-l); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  flex-shrink:0; transition:all 0.15s;
}
.open-palette-btn:hover { background:var(--primary); }
.tool-info-tag { display:flex; align-items:center; gap:5px; background:var(--primary-l); border-radius:var(--radius-sm); padding:5px 10px; flex-shrink:0; }
.tool-info-tag .tag-icon { font-size:15px; }
.tool-info-tag .tag-text { font-family:var(--font-title); font-size:13px; color:var(--primary-d); white-space:nowrap; }
.eraser-preview-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
.eraser-preview { background:repeating-conic-gradient(#ddd 0% 25%,#fff 0% 50%) 0 0/8px 8px; border-radius:4px; border:1.5px solid var(--primary-l); transition:all 0.2s; }
.sm-btn {
  width:30px; height:30px; border:1.5px solid var(--primary-l); border-radius:var(--radius-sm);
  background:var(--surface); color:var(--text); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-weight:bold;
  transition:all 0.15s; flex-shrink:0;
}
.sm-btn:hover { background:var(--primary-l); border-color:var(--primary); }

/* ── 调色板弹窗 ── */
#palette-modal {
  position:fixed; inset:0;
  background:rgba(93,83,74,0.22); backdrop-filter:blur(6px);
  z-index:800; display:none; align-items:flex-end; justify-content:center;
  padding-bottom:130px;
}
#palette-modal.show { display:flex; }
.palette-box {
  background:var(--surface); border-radius:var(--radius-lg); padding:18px;
  width:min(380px,calc(100vw - 24px)); max-height:52vh; overflow-y:auto;
  box-shadow:var(--shadow-float); border:1.5px solid var(--primary-l);
}
.palette-box h4 { font-family:var(--font-title); font-size:15px; color:var(--text); margin-bottom:12px; text-align:center; }
#full-palette-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:5px; }
.pal-color { aspect-ratio:1; border-radius:7px; border:2px solid transparent; cursor:pointer; transition:transform 0.12s,border-color 0.12s; }
.pal-color:hover { transform:scale(1.22); z-index:1; position:relative; }
.pal-color.selected { border-color:var(--primary-d); transform:scale(1.12); }
.palette-box .close-row { display:flex; justify-content:center; margin-top:12px; }
.pal-close-btn { padding:8px 28px; border:none; border-radius:var(--radius-md); background:var(--primary); color:#fff; font-family:var(--font-title); font-size:14px; cursor:pointer; box-shadow:var(--shadow-primary); }
.pal-close-btn:hover { opacity:0.85; }

/* ── 设置弹窗 ── */
#settings-modal {
  position:fixed; inset:0;
  background:rgba(93,83,74,0.28); backdrop-filter:blur(6px);
  z-index:900; display:none; align-items:center; justify-content:center;
}
#settings-modal.show { display:flex; }
.settings-box { background:var(--surface); border-radius:var(--radius-lg); padding:26px 22px; width:min(330px,calc(100vw - 32px)); box-shadow:var(--shadow-float); border:1.5px solid var(--primary-l); }
.settings-box h3 { font-family:var(--font-title); font-size:19px; color:var(--text); text-align:center; margin-bottom:20px; }
.sf { margin-bottom:14px; }
.sf label { display:block; font-size:10px; font-weight:800; color:var(--text-light); letter-spacing:0.7px; margin-bottom:5px; text-transform:uppercase; }
.sf input[type=number],.sf select { width:100%; padding:9px 13px; background:var(--bg); border:1.5px solid var(--primary-l); border-radius:var(--radius-md); color:var(--text); font-family:var(--font-body); font-size:14px; font-weight:600; outline:none; }
.sf input[type=number]:focus,.sf select:focus { border-color:var(--primary); }
.sf select { appearance:none; cursor:pointer; }
.sf input[type=color] { width:100%; height:42px; border:1.5px solid var(--primary-l); border-radius:var(--radius-md); cursor:pointer; padding:3px 8px; background:var(--bg); }
.settings-actions { display:flex; gap:10px; margin-top:20px; }
.settings-actions button { flex:1; padding:12px; border:none; border-radius:var(--radius-md); font-family:var(--font-title); font-size:14px; cursor:pointer; transition:opacity 0.15s,transform 0.12s; }
.settings-actions button:hover { transform:translateY(-1px); }
.btn-apply { background:var(--primary); color:#fff; box-shadow:var(--shadow-primary); }
.btn-cancel-s { background:var(--bg); color:var(--text); border:1.5px solid var(--primary-l)!important; }

/* ══════════════════════════════════════════
   Toast — 修复2：完整显示，支持换行
══════════════════════════════════════════ */
#toast {
  position: fixed;
  /* 标题栏正下方，留足间距 */
  top: calc(var(--titlebar-h) + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(0);
  /* 限制最大宽度并允许换行 */
  max-width: calc(100vw - 32px);
  background: rgba(60,52,46,0.92);
  backdrop-filter: blur(8px);
  color: #fff;
  padding: 10px 18px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 700;
  z-index: 9999;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  white-space: normal;       /* 允许换行 */
  word-break: break-all;
  text-align: center;
  line-height: 1.6;
  box-shadow: 0 4px 20px rgba(93,83,74,0.28);
  /* 默认隐藏：往上偏移 + 透明 */
  opacity: 0;
  transform: translateX(-50%) translateY(-12px);
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#coord-tip {
  position:fixed; pointer-events:none;
  background:var(--text); color:#fff;
  font-size:10px; font-weight:700; padding:3px 9px;
  border-radius:99px; z-index:50; display:none; white-space:nowrap; opacity:0.82;
}
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--primary-l); border-radius:99px; }
</style>
</head>
<body>
<div id="toast"></div>
<div id="coord-tip"></div>

<!-- 标题栏 -->
<div id="titlebar">
  <div id="titlebar-left">
    <div id="titlebar-logo">🫧</div>
    <div id="titlebar-text">
      <h1>拼豆豆编辑器</h1>
      <p>PIXEL BEAD PATTERN EDITOR</p>
    </div>
  </div>
  <div id="titlebar-actions">
    <button class="top-btn" id="btn-undo" disabled><span>↩</span>撤销</button>
    <button class="top-btn" id="btn-redo" disabled><span>↪</span>重做</button>
    <button class="top-btn icon-only" id="btn-settings" title="画布设置">⚙</button>
    <button class="top-btn icon-only" id="btn-clear" title="清空画布">🗑</button>
    <button class="top-btn" id="btn-export"><span>💾</span>导出</button>
  </div>
</div>

<!-- 画布 -->
<div id="canvas-container">
  <canvas id="grid-canvas"></canvas>
</div>

<!-- 预览面板 -->
<div id="preview-panel">
  <div id="preview-drag-layer"></div>
  <div id="preview-canvas-wrap">
    <canvas id="preview-canvas"></canvas>
    <button id="preview-toggle-btn" title="折叠预览">✕</button>
  </div>
  <div id="preview-resize-handle">⤡</div>
</div>

<!-- 最小化悬浮球（独立，可拖拽） -->
<div id="preview-bubble" title="点击展开预览">
  <canvas id="bubble-thumb" width="32" height="32"></canvas>
  <span id="bubble-label">预览</span>
</div>

<!-- 工具栏 -->
<div id="toolbar">
  <div id="toolbar-drag-zone"><div id="toolbar-drag-bar"></div></div>
  <div id="toolbar-row1">
    <button class="tool-btn active" data-tool="brush">✏️</button>
    <button class="tool-btn" data-tool="eraser">🧹</button>
    <button class="tool-btn" data-tool="fill">🪣</button>
    <button class="tool-btn" data-tool="picker">💉</button>
    <button class="tool-btn" data-tool="pan">✋</button>
    <div class="tool-sep"></div>
    <div id="color-swatch"><input type="color" id="color-input" value="#D8B4E2"></div>
    <div class="tool-sep"></div>
    <div id="recent-colors-row" style="display:flex;gap:4px;align-items:center;"></div>
  </div>
  <div id="toolbar-row2"></div>
</div>

<!-- 调色板 -->
<div id="palette-modal">
  <div class="palette-box">
    <h4>🎨 拼豆色卡</h4>
    <div id="full-palette-grid"></div>
    <div class="close-row"><button class="pal-close-btn" id="pal-close-btn">完成选色</button></div>
  </div>
</div>

<!-- 设置 -->
<div id="settings-modal">
  <div class="settings-box">
    <h3>⚙ 画布设置</h3>
    <div class="sf"><label>列数（宽）</label><input type="number" id="s-cols" value="32" min="8" max="128"></div>
    <div class="sf"><label>行数（高）</label><input type="number" id="s-rows" value="32" min="8" max="128"></div>
    <div class="sf"><label>背景颜色</label><input type="color" id="s-bg" value="#f5f0eb"></div>
    <div class="sf"><label>网格线</label>
      <select id="s-grid">
        <option value="1">显示网格线</option>
        <option value="0">隐藏网格线</option>
      </select>
    </div>
    <div class="settings-actions">
      <button class="btn-cancel-s" id="s-cancel">取消</button>
      <button class="btn-apply" id="s-apply">✓ 应用</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 颜色数据
// ============================================================
const PALETTE = [

  '#EE00FF','#FF00EE','#FF00CC','#FF00AA','#FF0088','#FF0066','#FF0044','#FF0022','#FF0011','#FF0000',

// ============================================================
// 状态
// ============================================================
const S = {
  tool:'brush', brushSize:1, eraserSize:1,
  currentColor:'#D8B4E2',
  recentColors:['#000000','#FFFFFF','#FF6600','#FFDAC1','#D8B4E2'],
  showGrid:true, bgColor:'#f5f0eb',
  cols:32, rows:32, cellSize:0,
  pixels:[],
  history:[], historyIndex:-1,
  isDrawing:false, isPanning:false, panStart:null,
  offsetX:0, offsetY:0, scale:1,
  touchStartDist:0, touchStartScale:1,
  touchStartOffX:0, touchStartOffY:0, touchMidX:0, touchMidY:0,
  drawnSet: new Set(),
};
const TITLEBAR_H = 56;

// ============================================================
// DOM
// ============================================================
const canvas   = document.getElementById('grid-canvas');
const ctx      = canvas.getContext('2d');
const previewC = document.getElementById('preview-canvas');
const pCtx     = previewC.getContext('2d');
const container= document.getElementById('canvas-container');
const coordTip = document.getElementById('coord-tip');
const toastEl  = document.getElementById('toast');
const row2     = document.getElementById('toolbar-row2');
const pvPanel  = document.getElementById('preview-panel');
const pvBubble = document.getElementById('preview-bubble');
const bubbleThumb = document.getElementById('bubble-thumb');
const bCtx     = bubbleThumb.getContext('2d');

// ============================================================
// 画布初始化 & 铺满宽度
// ============================================================
function initGrid(cols, rows) {
  S.cols = cols; S.rows = rows;
  S.pixels = Array.from({length:rows}, () => Array(cols).fill(null));
  fitCanvas(); saveSnap(); render();
}

function fitCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight - TITLEBAR_H;
  S.cellSize = Math.max(1, Math.floor(vw / S.cols));
  canvas.width  = S.cols * S.cellSize;
  canvas.height = S.rows * S.cellSize;
  // scale 精确撑满屏幕宽度
  S.scale   = vw / canvas.width;
  S.offsetX = 0;
  const scaledH = canvas.height * S.scale;
  S.offsetY = Math.max(0, Math.floor((vh - scaledH) / 2));
  applyTx();
}

function applyTx() {
  canvas.style.transform = `translate(${S.offsetX}px,${S.offsetY}px) scale(${S.scale})`;
  canvas.style.transformOrigin = '0 0';
}

// ============================================================
// 渲染
// ============================================================
function render() {
  ctx.fillStyle = S.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r=0; r<S.rows; r++)
    for (let c=0; c<S.cols; c++)
      if (S.pixels[r][c]) {
        ctx.fillStyle = S.pixels[r][c];
        ctx.fillRect(c*S.cellSize, r*S.cellSize, S.cellSize, S.cellSize);
      }
  if (S.showGrid) drawGridLines();
  renderPreview();
}

function drawGridLines() {
  ctx.save();
  ctx.strokeStyle = 'rgba(140,130,120,0.25)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let c=0; c<=S.cols; c++) { ctx.moveTo(c*S.cellSize,0); ctx.lineTo(c*S.cellSize,S.rows*S.cellSize); }
  for (let r=0; r<=S.rows; r++) { ctx.moveTo(0,r*S.cellSize); ctx.lineTo(S.cols*S.cellSize,r*S.cellSize); }
  ctx.stroke(); ctx.restore();
}

function repaintCell(r, c) {
  const x=c*S.cellSize, y=r*S.cellSize, sz=S.cellSize;
  ctx.fillStyle = S.pixels[r][c] || S.bgColor;
  ctx.fillRect(x, y, sz, sz);
  if (S.showGrid) {
    ctx.save();
    ctx.strokeStyle='rgba(140,130,120,0.25)'; ctx.lineWidth=0.5;
    ctx.strokeRect(x+.25, y+.25, sz-.5, sz-.5);
    ctx.restore();
  }
}

function renderPreview() {
  // 主预览面板
  const wrap = document.getElementById('preview-canvas-wrap');
  const pw = wrap.clientWidth - 16;
  const size = Math.max(50, pw);
  previewC.width=S.cols; previewC.height=S.rows;
  previewC.style.width=size+'px'; previewC.style.height=size+'px';
  pCtx.fillStyle=S.bgColor; pCtx.fillRect(0,0,S.cols,S.rows);
  for (let r=0;r<S.rows;r++) for (let c=0;c<S.cols;c++)
    if (S.pixels[r][c]) { pCtx.fillStyle=S.pixels[r][c]; pCtx.fillRect(c,r,1,1); }

  // 悬浮球缩略图
  bubbleThumb.width=32; bubbleThumb.height=32;
  bCtx.fillStyle=S.bgColor; bCtx.fillRect(0,0,32,32);
  const scX=32/S.cols, scY=32/S.rows;
  for (let r=0;r<S.rows;r++) for (let c=0;c<S.cols;c++)
    if (S.pixels[r][c]) {
      bCtx.fillStyle=S.pixels[r][c];
      bCtx.fillRect(Math.floor(c*scX), Math.floor(r*scY), Math.max(1,Math.ceil(scX)), Math.max(1,Math.ceil(scY)));
    }
}

// ============================================================
// 历史
// ============================================================
function saveSnap() {
  const snap = S.pixels.map(r=>[...r]);
  S.history = S.history.slice(0, S.historyIndex+1);
  S.history.push(snap);
  if (S.history.length>80) S.history.shift();
  S.historyIndex = S.history.length-1;
  updateUndoUI();
}
function undo() {
  if (S.historyIndex<=0) return;
  S.historyIndex--;
  S.pixels = S.history[S.historyIndex].map(r=>[...r]);
  render(); updateUndoUI();
}
function redo() {
  if (S.historyIndex>=S.history.length-1) return;
  S.historyIndex++;
  S.pixels = S.history[S.historyIndex].map(r=>[...r]);
  render(); updateUndoUI();
}
function updateUndoUI() {
  document.getElementById('btn-undo').disabled = S.historyIndex<=0;
  document.getElementById('btn-redo').disabled = S.historyIndex>=S.history.length-1;
}

// ============================================================
// 坐标 & 绘制
// ============================================================
function toCell(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  return {
    row: Math.floor((cy-rect.top)  / (S.cellSize*S.scale)),
    col: Math.floor((cx-rect.left) / (S.cellSize*S.scale)),
  };
}
function inBounds(r,c) { return r>=0&&r<S.rows&&c>=0&&c<S.cols; }

function paintAt(row, col) {
  const sz=S.tool==='eraser'?S.eraserSize:S.brushSize;
  const half=Math.floor(sz/2);
  const color=S.tool==='eraser'?null:S.currentColor;
  let changed=false;
  for (let dr=-half;dr<sz-half;dr++) for (let dc=-half;dc<sz-half;dc++) {
    const r=row+dr, c=col+dc;
    if (inBounds(r,c)) { S.pixels[r][c]=color; repaintCell(r,c); changed=true; }
  }
  if (changed) renderPreview();
}

function floodFill(sr, sc, fillColor) {
  const target=S.pixels[sr][sc];
  if (target===fillColor) return;
  const stack=[[sr,sc]], visited=new Set();
  while (stack.length) {
    const [r,c]=stack.pop(), k=r+','+c;
    if (visited.has(k)||!inBounds(r,c)||S.pixels[r][c]!==target) continue;
    visited.add(k); S.pixels[r][c]=fillColor;
    stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1]);
  }
  render();
}

// ============================================================
// 指针事件
// ============================================================
function evPos(e) {
  return e.touches ? {clientX:e.touches[0].clientX,clientY:e.touches[0].clientY} : {clientX:e.clientX,clientY:e.clientY};
}
container.addEventListener('mousedown',  onDown, {passive:false});
container.addEventListener('mousemove',  onMove, {passive:false});
container.addEventListener('mouseup',    onUp);
container.addEventListener('mouseleave', onUp);
container.addEventListener('touchstart', onDown, {passive:false});
container.addEventListener('touchmove',  onMove, {passive:false});
container.addEventListener('touchend',   onUp);
container.addEventListener('touchcancel',onUp);
container.addEventListener('wheel',      onWheel,{passive:false});

function onDown(e) {
  e.preventDefault();
  if (e.touches&&e.touches.length===2) {
    const dx=e.touches[1].clientX-e.touches[0].clientX, dy=e.touches[1].clientY-e.touches[0].clientY;
    S.touchStartDist=Math.hypot(dx,dy); S.touchStartScale=S.scale;
    S.touchStartOffX=S.offsetX; S.touchStartOffY=S.offsetY;
    S.touchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    S.touchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    S.isDrawing=false; S.isPanning=false; return;
  }
  const {clientX,clientY}=evPos(e);
  if (S.tool==='pan') {
    S.isPanning=true; S.panStart={x:clientX-S.offsetX,y:clientY-S.offsetY};
    container.style.cursor='grabbing'; return;
  }
  const {row,col}=toCell(clientX,clientY);
  if (!inBounds(row,col)) return;
  if (S.tool==='picker') {
    const c=S.pixels[row][col]; if (c) { setColor(c); showToast('已取色 '+c); }
    activateTool('brush'); return;
  }
  if (S.tool==='fill') { floodFill(row,col,S.currentColor); saveSnap(); return; }
  S.isDrawing=true; S.drawnSet=new Set();
  paintAt(row,col); S.drawnSet.add(row+','+col);
}

function onMove(e) {
  e.preventDefault();
  if (e.touches&&e.touches.length===2) {
    const dx=e.touches[1].clientX-e.touches[0].clientX, dy=e.touches[1].clientY-e.touches[0].clientY;
    const dist=Math.hypot(dx,dy);
    const newSc=Math.min(10,Math.max(0.25,S.touchStartScale*dist/S.touchStartDist));
    S.offsetX=S.touchStartOffX-(S.touchMidX-S.touchStartOffX)*(newSc/S.touchStartScale-1);
    S.offsetY=S.touchStartOffY-(S.touchMidY-S.touchStartOffY)*(newSc/S.touchStartScale-1);
    S.scale=newSc; applyTx(); return;
  }
  const {clientX,clientY}=evPos(e);
  const {row,col}=toCell(clientX,clientY);
  if (inBounds(row,col)) {
    coordTip.style.display='block';
    coordTip.style.left=(clientX+14)+'px'; coordTip.style.top=(clientY-26)+'px';
    coordTip.textContent=`C${col+1}  R${row+1}`;
  } else { coordTip.style.display='none'; }
  if (S.isPanning&&S.panStart) {
    S.offsetX=clientX-S.panStart.x; S.offsetY=clientY-S.panStart.y; applyTx(); return;
  }
  if (!S.isDrawing) return;
  const key=row+','+col; if (S.drawnSet.has(key)) return;
  if (inBounds(row,col)) { paintAt(row,col); S.drawnSet.add(key); }
}

function onUp() {
  if (S.isDrawing) { saveSnap(); S.isDrawing=false; }
  if (S.isPanning) { S.isPanning=false; container.style.cursor='crosshair'; }
  coordTip.style.display='none';
}

function onWheel(e) {
  e.preventDefault();
  const f=e.deltaY<0?1.12:0.9;
  const ns=Math.min(12,Math.max(0.2,S.scale*f));
  const r=container.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  S.offsetX=mx-(mx-S.offsetX)*(ns/S.scale);
  S.offsetY=my-(my-S.offsetY)*(ns/S.scale);
  S.scale=ns; applyTx();
}

// ============================================================
// 工具激活
// ============================================================
function activateTool(tool) {
  S.tool=tool;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  const cursors={brush:'crosshair',eraser:'cell',fill:'crosshair',picker:'copy',pan:'grab'};
  container.style.cursor=cursors[tool]||'crosshair';
  renderToolParams();
}
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn=>{
  btn.addEventListener('click',()=>activateTool(btn.dataset.tool));
  btn.addEventListener('touchend',e=>{e.preventDefault();activateTool(btn.dataset.tool);});
});

// ============================================================
// 工具参数区
// ============================================================
function renderToolParams() {
  row2.innerHTML='';
  const tool=S.tool;
  if (tool==='brush') {
    row2.appendChild(makeTag('✏️','画笔')); row2.appendChild(makeSep());
    const sg=makeGroup('粗细'); sg.appendChild(makeSizeDots('brush')); row2.appendChild(sg);
    row2.appendChild(makeSep());
    const cg=makeGroup('颜色'); cg.appendChild(makeMiniPalette()); row2.appendChild(cg);
    row2.appendChild(makeOpenPaletteBtn());
  } else if (tool==='eraser') {
    row2.appendChild(makeTag('🧹','橡皮')); row2.appendChild(makeSep());
    const sg=makeGroup('大小'); sg.appendChild(makeSizeDots('eraser')); row2.appendChild(sg);
    row2.appendChild(makeSep()); row2.appendChild(makeEraserPreview());
  } else if (tool==='fill') {
    row2.appendChild(makeTag('🪣','填充')); row2.appendChild(makeSep());
    const cg=makeGroup('填充色'); cg.appendChild(makeMiniPalette()); row2.appendChild(cg);
    row2.appendChild(makeOpenPaletteBtn());
    const tip=el('span','param-label');
    tip.style.cssText='background:rgba(181,234,215,0.2);padding:4px 8px;border-radius:8px;font-size:9px;color:#3aaa80;';
    tip.textContent='点击格子泛洪填色'; row2.appendChild(tip);
  } else if (tool==='picker') {
    row2.appendChild(makeTag('💉','取色')); row2.appendChild(makeSep());
    const tip=el('div');
    tip.style.cssText='background:rgba(216,180,226,0.12);border-radius:12px;padding:8px 14px;color:var(--text-light);font-size:11px;font-weight:700;line-height:1.5;';
    tip.innerHTML='点击画布格子<br><span style="color:var(--primary-d)">自动吸取颜色并切回画笔</span>';
    row2.appendChild(tip);
  } else if (tool==='pan') {
    row2.appendChild(makeTag('✋','平移')); row2.appendChild(makeSep());
    const zg=makeGroup('视图缩放');
    const zrow=el('div'); zrow.style.cssText='display:flex;gap:5px;';
    [['－',()=>zoomAt(0.85)],['＋',()=>zoomAt(1.15)],['↺',resetView]].forEach(([icon,cb])=>zrow.appendChild(makeSmBtn(icon,cb)));
    zg.appendChild(zrow); row2.appendChild(zg);
  }
}

function resetView() {
  const vw=window.innerWidth, vh=window.innerHeight-TITLEBAR_H;
  S.scale=vw/canvas.width; S.offsetX=0;
  S.offsetY=Math.max(0,Math.floor((vh-canvas.height*S.scale)/2));
  applyTx(); showToast('↺ 视图已重置');
}
function zoomAt(f) {
  const ns=Math.min(12,Math.max(0.2,S.scale*f));
  const cx=window.innerWidth/2, cy=(window.innerHeight-TITLEBAR_H)/2+TITLEBAR_H;
  S.offsetX=cx-(cx-S.offsetX)*(ns/S.scale); S.offsetY=cy-(cy-S.offsetY)*(ns/S.scale);
  S.scale=ns; applyTx();
}

function el(tag,cls) { const e=document.createElement(tag||'div'); if(cls)e.className=cls; return e; }
function makeTag(icon,text) {
  const d=el('div','tool-info-tag');
  d.innerHTML=`<span class="tag-icon">${icon}</span><span class="tag-text">${text}</span>`; return d;
}
function makeSep() { return el('div','tool-sep'); }
function makeGroup(label) { const d=el('div','param-group'); const lb=el('div','param-label'); lb.textContent=label; d.appendChild(lb); return d; }
function makeSizeDots(type) {
  const wrap=el('div','size-dots');
  [1,2,3,4,5].forEach(s=>{
    const btn=el('button','size-dot-btn');
    const cur=type==='brush'?S.brushSize:S.eraserSize;
    if (cur===s) btn.classList.add('active');
    const dsz=7+s*4; btn.style.cssText=`width:${dsz+8}px;height:${dsz+8}px;`;
    const dot=el('div');
    dot.style.cssText=`width:${dsz}px;height:${dsz}px;border-radius:50%;background:${type==='brush'?S.currentColor:'#9B8E84'};pointer-events:none;`;
    btn.appendChild(dot);
    btn.addEventListener('click',()=>{
      if(type==='brush')S.brushSize=s; else S.eraserSize=s;
      wrap.querySelectorAll('.size-dot-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
      if(type==='eraser')updateEraserPreview();
    });
    btn.addEventListener('touchend',e=>{e.preventDefault();btn.click();});
    wrap.appendChild(btn);
  }); return wrap;
}
function makeMiniPalette() {
  const wrap=el('div','mini-palette');
  QUICK_COLORS.forEach(c=>{
    const d=el('div','mini-color'); d.style.background=c;
    if(S.currentColor===c)d.classList.add('selected');
    d.addEventListener('click',()=>setColor(c));
    d.addEventListener('touchend',ev=>{ev.preventDefault();setColor(c);});
    wrap.appendChild(d);
  }); return wrap;
}
function makeOpenPaletteBtn() {
  const btn=el('button','open-palette-btn'); btn.textContent='🎨';
  btn.addEventListener('click',()=>document.getElementById('palette-modal').classList.add('show'));
  btn.addEventListener('touchend',e=>{e.preventDefault();document.getElementById('palette-modal').classList.add('show');});
  return btn;
}
function makeEraserPreview() {
  const wrap=el('div','eraser-preview-wrap');
  const lb=el('div','param-label'); lb.textContent='预览';
  const box=el('div','eraser-preview'); box.id='eraser-preview-box';
  const sz=Math.min(56,S.eraserSize*14+6); box.style.width=box.style.height=sz+'px';
  wrap.appendChild(lb); wrap.appendChild(box); return wrap;
}
function updateEraserPreview() {
  const box=document.getElementById('eraser-preview-box'); if(!box)return;
  const sz=Math.min(56,S.eraserSize*14+6); box.style.width=box.style.height=sz+'px';
}
function makeSmBtn(icon,cb) {
  const btn=el('button','sm-btn'); btn.textContent=icon;
  btn.addEventListener('click',cb);
  btn.addEventListener('touchend',e=>{e.preventDefault();cb();});
  return btn;
}

// ============================================================
// 颜色
// ============================================================
function setColor(hex) {
  S.currentColor=hex;
  document.getElementById('color-swatch').style.background=hex;
  document.getElementById('color-input').value=hex;
  addRecentColor(hex);
  document.querySelectorAll('.pal-color,.mini-color').forEach(e=>{
    e.classList.toggle('selected',e.dataset.color===hex||rgbToHex(e.style.background)===hex.toLowerCase());
  });
  renderToolParams();
}
function rgbToHex(rgb) {
  const m=rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
  if(!m)return rgb;
  return '#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}
function addRecentColor(hex) {
  S.recentColors=[hex,...S.recentColors.filter(c=>c!==hex)].slice(0,8);
  renderRecentRow();
}
function renderRecentRow() {
  const con=document.getElementById('recent-colors-row'); con.innerHTML='';
  S.recentColors.forEach(c=>{
    const d=el('div','recent-dot'); d.style.background=c; d.title=c;
    d.addEventListener('click',()=>setColor(c));
    d.addEventListener('touchend',e=>{e.preventDefault();setColor(c);});
    con.appendChild(d);
  });
}
document.getElementById('color-input').addEventListener('input',e=>setColor(e.target.value));

// ============================================================
// 调色板
// ============================================================
function initFullPalette() {
  const grid=document.getElementById('full-palette-grid');
  PALETTE.forEach(c=>{
    const d=el('div','pal-color'); d.style.background=c; d.dataset.color=c; d.title=c;
    d.addEventListener('click',()=>{setColor(c);document.getElementById('palette-modal').classList.remove('show');});
    d.addEventListener('touchend',ev=>{ev.preventDefault();setColor(c);document.getElementById('palette-modal').classList.remove('show');});
    grid.appendChild(d);
  });
}
document.getElementById('pal-close-btn').addEventListener('click',()=>document.getElementById('palette-modal').classList.remove('show'));
document.getElementById('palette-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('palette-modal'))document.getElementById('palette-modal').classList.remove('show');
});

// ============================================================
// 预览面板折叠 / 悬浮球
// ============================================================
let pvCollapsed = false;

// 悬浮球拖拽状态
const bub = { drag:false, moved:false, sx:0, sy:0, sl:0, st:0 };

function collapsePreview() {
  pvCollapsed = true;
  pvPanel.classList.add('collapsed');
  // 悬浮球位置：与面板当前位置对齐
  const r = pvPanel.getBoundingClientRect();
  pvBubble.style.left  = r.left + 'px';
  pvBubble.style.top   = r.top  + 'px';
  pvBubble.style.right = 'auto';
  pvBubble.classList.add('show');
}

function expandPreview() {
  pvCollapsed = false;
  pvPanel.classList.remove('collapsed');
  pvBubble.classList.remove('show');
}

document.getElementById('preview-toggle-btn').addEventListener('click', e => {
  e.stopPropagation(); collapsePreview();
});

// 悬浮球：点击展开（未拖拽时）/ 拖拽移动
pvBubble.addEventListener('mousedown', e => {
  e.stopPropagation();
  bub.drag = true; bub.moved = false;
  bub.sx = e.clientX; bub.sy = e.clientY;
  const r = pvBubble.getBoundingClientRect();
  bub.sl = r.left; bub.st = r.top;
  pvBubble.style.left  = bub.sl + 'px';
  pvBubble.style.top   = bub.st + 'px';
  pvBubble.style.right = 'auto';
});
pvBubble.addEventListener('touchstart', e => {
  e.stopPropagation();
  bub.drag = true; bub.moved = false;
  bub.sx = e.touches[0].clientX; bub.sy = e.touches[0].clientY;
  const r = pvBubble.getBoundingClientRect();
  bub.sl = r.left; bub.st = r.top;
  pvBubble.style.left  = bub.sl + 'px';
  pvBubble.style.top   = bub.st + 'px';
  pvBubble.style.right = 'auto';
}, {passive:true});

document.addEventListener('mousemove', e => {
  if (!bub.drag) return;
  const dx = e.clientX - bub.sx, dy = e.clientY - bub.sy;
  if (Math.abs(dx)>3 || Math.abs(dy)>3) bub.moved = true;
  if (bub.moved) {
    pvBubble.style.left = Math.max(0, Math.min(window.innerWidth  - pvBubble.offsetWidth,  bub.sl+dx)) + 'px';
    pvBubble.style.top  = Math.max(TITLEBAR_H, Math.min(window.innerHeight - pvBubble.offsetHeight, bub.st+dy)) + 'px';
  }
});
document.addEventListener('touchmove', e => {
  if (!bub.drag) return;
  const dx = e.touches[0].clientX - bub.sx, dy = e.touches[0].clientY - bub.sy;
  if (Math.abs(dx)>3 || Math.abs(dy)>3) bub.moved = true;
  if (bub.moved) {
    pvBubble.style.left = Math.max(0, Math.min(window.innerWidth  - pvBubble.offsetWidth,  bub.sl+dx)) + 'px';
    pvBubble.style.top  = Math.max(TITLEBAR_H, Math.min(window.innerHeight - pvBubble.offsetHeight, bub.st+dy)) + 'px';
  }
}, {passive:true});

document.addEventListener('mouseup', e => {
  if (bub.drag) {
    if (!bub.moved) expandPreview(); // 点击（未移动）→ 展开
    bub.drag = false;
  }
});
document.addEventListener('touchend', e => {
  if (bub.drag) {
    if (!bub.moved) expandPreview();
    bub.drag = false;
  }
});

// ============================================================
// 预览面板拖拽 & 缩放
// ============================================================
const pvDrag   = document.getElementById('preview-drag-layer');
const pvResize = document.getElementById('preview-resize-handle');
const pv = { drag:false, resize:false, sx:0, sy:0, sl:0, st:0, sw:0 };

function pvAbsolute() {
  const r=pvPanel.getBoundingClientRect();
  pvPanel.style.left=r.left+'px'; pvPanel.style.top=r.top+'px';
  pvPanel.style.right='auto'; pvPanel.style.bottom='auto';
}
pvDrag.addEventListener('mousedown',e=>{
  e.stopPropagation(); pvAbsolute(); pv.drag=true;
  pv.sx=e.clientX; pv.sy=e.clientY;
  pv.sl=parseFloat(pvPanel.style.left); pv.st=parseFloat(pvPanel.style.top);
});
pvDrag.addEventListener('touchstart',e=>{
  e.stopPropagation(); pvAbsolute(); pv.drag=true;
  pv.sx=e.touches[0].clientX; pv.sy=e.touches[0].clientY;
  pv.sl=parseFloat(pvPanel.style.left); pv.st=parseFloat(pvPanel.style.top);
},{passive:true});
pvResize.addEventListener('mousedown',e=>{
  e.preventDefault(); e.stopPropagation(); pv.resize=true;
  pv.sx=e.clientX; pv.sw=pvPanel.getBoundingClientRect().width;
});
pvResize.addEventListener('touchstart',e=>{
  e.stopPropagation(); pv.resize=true;
  pv.sx=e.touches[0].clientX; pv.sw=pvPanel.getBoundingClientRect().width;
},{passive:true});

document.addEventListener('mousemove',e=>{
  if(pv.drag){
    const dx=e.clientX-pv.sx, dy=e.clientY-pv.sy;
    pvPanel.style.left=Math.max(0,Math.min(window.innerWidth-pvPanel.offsetWidth,pv.sl+dx))+'px';
    pvPanel.style.top=Math.max(TITLEBAR_H,Math.min(window.innerHeight-pvPanel.offsetHeight,pv.st+dy))+'px';
  }
  if(pv.resize){
    const nw=Math.max(90,Math.min(360,pv.sw+(e.clientX-pv.sx)));
    pvPanel.style.width=nw+'px'; renderPreview();
  }
});
document.addEventListener('touchmove',e=>{
  const cx=e.touches[0].clientX, cy=e.touches[0].clientY;
  if(pv.drag){
    const dx=cx-pv.sx, dy=cy-pv.sy;
    pvPanel.style.left=Math.max(0,Math.min(window.innerWidth-pvPanel.offsetWidth,pv.sl+dx))+'px';
    pvPanel.style.top=Math.max(TITLEBAR_H,Math.min(window.innerHeight-pvPanel.offsetHeight,pv.st+dy))+'px';
  }
  if(pv.resize){
    const nw=Math.max(90,Math.min(360,pv.sw+(cx-pv.sx)));
    pvPanel.style.width=nw+'px'; renderPreview();
  }
},{passive:true});
document.addEventListener('mouseup', ()=>{pv.drag=pv.resize=false;});
document.addEventListener('touchend',()=>{pv.drag=pv.resize=false;});

// ============================================================
// 工具栏拖拽
// ============================================================
const toolbar =document.getElementById('toolbar');
const tbHandle=document.getElementById('toolbar-drag-zone');
const tb={drag:false,sx:0,sy:0,sl:0,st:0};
function tbAbsolute(){
  toolbar.style.transform='none';
  const r=toolbar.getBoundingClientRect();
  toolbar.style.left=r.left+'px'; toolbar.style.top=r.top+'px'; toolbar.style.bottom='auto';
}
tbHandle.addEventListener('mousedown',e=>{
  tbAbsolute(); tb.drag=true; tb.sx=e.clientX; tb.sy=e.clientY;
  tb.sl=parseFloat(toolbar.style.left); tb.st=parseFloat(toolbar.style.top); e.preventDefault();
});
tbHandle.addEventListener('touchstart',e=>{
  tbAbsolute(); tb.drag=true; tb.sx=e.touches[0].clientX; tb.sy=e.touches[0].clientY;
  tb.sl=parseFloat(toolbar.style.left); tb.st=parseFloat(toolbar.style.top);
},{passive:true});
document.addEventListener('mousemove',e=>{
  if(!tb.drag)return;
  toolbar.style.left=Math.max(0,Math.min(window.innerWidth-toolbar.offsetWidth,tb.sl+e.clientX-tb.sx))+'px';
  toolbar.style.top=Math.max(TITLEBAR_H,Math.min(window.innerHeight-toolbar.offsetHeight,tb.st+e.clientY-tb.sy))+'px';
});
document.addEventListener('touchmove',e=>{
  if(!tb.drag)return;
  toolbar.style.left=Math.max(0,Math.min(window.innerWidth-toolbar.offsetWidth,tb.sl+e.touches[0].clientX-tb.sx))+'px';
  toolbar.style.top=Math.max(TITLEBAR_H,Math.min(window.innerHeight-toolbar.offsetHeight,tb.st+e.touches[0].clientY-tb.sy))+'px';
},{passive:true});
document.addEventListener('mouseup', ()=>{tb.drag=false;});
document.addEventListener('touchend',()=>{tb.drag=false;});

// ============================================================
// 顶部按钮
// ============================================================
document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);
document.getElementById('btn-clear').addEventListener('click',()=>{
  if(!confirm('确定清空画布吗？'))return;
  S.pixels=Array.from({length:S.rows},()=>Array(S.cols).fill(null));
  saveSnap(); render(); showToast('🗑 画布已清空');
});
document.getElementById('btn-export').addEventListener('click',()=>{
  const ec=document.createElement('canvas'), csz=16;
  ec.width=S.cols*csz; ec.height=S.rows*csz;
  const ec2=ec.getContext('2d');
  ec2.fillStyle=S.bgColor; ec2.fillRect(0,0,ec.width,ec.height);
  for(let r=0;r<S.rows;r++) for(let c=0;c<S.cols;c++)
    if(S.pixels[r][c]){ec2.fillStyle=S.pixels[r][c];ec2.fillRect(c*csz,r*csz,csz,csz);}
  const a=document.createElement('a');
  a.download='pindoudou_'+Date.now()+'.png'; a.href=ec.toDataURL('image/png'); a.click();
  showToast('💾 图纸导出成功！');
});
document.getElementById('btn-settings').addEventListener('click',()=>{
  document.getElementById('s-cols').value=S.cols;
  document.getElementById('s-rows').value=S.rows;
  document.getElementById('s-bg').value=S.bgColor;
  document.getElementById('s-grid').value=S.showGrid?'1':'0';
  document.getElementById('settings-modal').classList.add('show');
});
document.getElementById('s-cancel').addEventListener('click',()=>document.getElementById('settings-modal').classList.remove('show'));
document.getElementById('s-apply').addEventListener('click',()=>{
  const nc=Math.min(128,Math.max(8,parseInt(document.getElementById('s-cols').value)||32));
  const nr=Math.min(128,Math.max(8,parseInt(document.getElementById('s-rows').value)||32));
  S.bgColor=document.getElementById('s-bg').value;
  S.showGrid=document.getElementById('s-grid').value==='1';
  if(nc!==S.cols||nr!==S.rows){
    if(!confirm('改变尺寸将清空画布，确定吗？'))return;
    initGrid(nc,nr);
  } else { render(); }
  document.getElementById('settings-modal').classList.remove('show');
  showToast('✓ 设置已应用');
});

// ============================================================
// 键盘
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
  const map={b:'brush',e:'eraser',f:'fill',i:'picker',h:'pan'};
  if(map[e.key])activateTool(map[e.key]);
});

// ============================================================
// Toast — 修复2：完整显示
// ============================================================
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2600);
}

// ============================================================
// 窗口缩放
// ============================================================
window.addEventListener('resize',()=>{fitCanvas();render();});
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());

// ============================================================
// 启动
// ============================================================
initFullPalette();
initGrid(32,32);
setColor('#D8B4E2');
renderRecentRow();
renderToolParams();
setTimeout(()=>showToast('✨ 欢迎使用拼豆豆图纸编辑器！'),400);
setTimeout(()=>showToast('💡 快捷键: B画笔 E橡皮 F填充 I取色 H平移'),3200);
</script>
